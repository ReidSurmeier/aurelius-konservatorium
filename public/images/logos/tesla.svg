<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Tesla T icon -->
  <g transform="translate(16, 8)">
    <!-- Top bar of T -->
    <path d="M0 14 C8 0 32 0 40 14" stroke="#CC0000" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Left serif -->
    <path d="M0 14 C0 10 4 8 8 10" stroke="#CC0000" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Right serif -->
    <path d="M40 14 C40 10 36 8 32 10" stroke="#CC0000" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Vertical stem -->
    <line x1="20" y1="14" x2="20" y2="54" stroke="#CC0000" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="72" y="50" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#CC0000" letter-spacing="3">TESLA</text>
</svg>
